<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title></title>
    <link rel="stylesheet" th:href="@{/css/nav-bar.css}">
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Material+Symbols+Rounded:opsz,wght,FILL,GRAD@24,400,0,0" />
</head>
<body>
<nav th:fragment="navbar" class="navbar">
    <a class="navbar-brand" href="/">WorkTrack</a>
    <div class="nav-bar-div">
        <ul class="navbar-ul" id="nav-links">
            <li class="nav-item"><a href="/clients/home">Dashboard</a></li>
            <li class="nav-item"><a href="/projects/list">Projects</a></li>
            <li class="nav-item"><a href="/tasks/list">Tasks</a></li>
            <li class="nav-item"><a href="/login?logout">↳ Logout</a></li>
        </ul>
    </div>

    <script>
        document.addEventListener("DOMContentLoaded", function() {
            const currentPath = window.location.pathname;
            const navLinks = document.querySelectorAll('#nav-links a');

            navLinks.forEach(link => {
                if (currentPath.includes(link.getAttribute('href').split('/')[1])) {
                    link.classList.add('active');
                }
            });
        });
    </script>
</nav>
</body>
</html>
