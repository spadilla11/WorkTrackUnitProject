<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>WorkTrack - Clients - Projects</title>
    <link rel="stylesheet" th:href="@{/css/nav-bar.css}">
    <link rel="stylesheet" th:href="@{/css/projects-list.css}">

</head>
<body>

<div th:replace="fragments/navbar :: navbar"></div>

<div class="container">
    <div class="header-row">
        <h2>Projects</h2>
        <a th:href="@{/projects/new}" class="btn-new">+ New Project</a>
    </div>

    <table class="client-table" th:if="${not #lists.isEmpty(projects)}">
        <thead>
        <tr>
            <th>Project Title</th>
            <th>Client</th>
            <th>Budget</th>
            <th>Deadline</th>
            <th>Status</th>
            <th>Actions</th>
        </tr>
        </thead>
        <tbody>
        <tr th:each="project : ${projects}" class="client-row">
            <td class="bold-text" th:text="${project.title}" >Title</td>
            <td th:text="${client.name}">Client Name</td>
            <td th:text="${'$' + project.totalBudget}">$0</td>
            <td th:text="${project.deadLine}">Due Date</td>
            <td>
                <span class="status-badge" th:text="${project.status}">Status</span>
            </td>
            <td class="actions">
                <a th:href="@{/projects/edit/{id}(id=${project.id})}">✏️</a>
                <form th:action="@{/projects/delete/{id}(id=${project.id})}" method="post" style="display: inline;">
                    <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}" />
                    <button type="submit" style="background:none; border:none; cursor:pointer;">🗑️</button>
                </form>
                <a th:href="@{/projects/details/{id}(id=${project.id})}"> View Details </a>
            </td>
        </tr>
        </tbody>
    </table>

    <div th:if="${#lists.isEmpty(projects)}" class="empty-state">
        <div class="empty-icon">📂</div>
        <h3>No projects found</h3>
        <p>It looks like your workspace is empty. Create a new project to get started!</p>
    </div>
</div>

</body>
</html>
