<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Title</title>
    <link rel="stylesheet" th:href="@{/css/nav-bar.css}">
    <link rel="stylesheet" th:href="@{/css/create-form.css}">

</head>
<body>

<div th:replace="fragments/navbar :: navbar"></div>


<div class="form-container">
    <div class="form-card">
        <h2 th:text="${task.id != null} ? 'Edit Task' : 'Create New Task'">Edit Task</h2>
        <form th:action="@{/tasks/save}" th:object="${task}" method="post" >
            <input type="hidden" th:field="*{id}" />
            <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}" />

            <div class="field-group">
                <label>Description</label>
                <input type="text" th:field="*{description}" placeholder="description" required>
            </div>

            <div class="field-group">
                <label>Completed</label>
                <input type="checkbox" th:field="*{completed}" placeholder="Completed?" required>
            </div>


            <div class="btn-group">
                <button type="submit" class="btn-save">Save Client</button>
                <a th:href="@{/tasks/list}" class="btn-cancel">Cancel</a>
            </div>
        </form>
    </div>
</div>

<div th:replace="fragments/footer :: common-footer"></div>
</body>
</html>
