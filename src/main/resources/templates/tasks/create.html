<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Title</title>
    <link rel="stylesheet" th:href="@{/css/nav-bar.css}">
    <link rel="stylesheet" th:href="@{/css/create-form.css}">

</head>
<body>

<div th:replace="fragments/navbar :: navbar"></div>


<div class="form-container">
    <div class="form-card">
        <h2>Create New Task</h2>
        <form th:action="@{/tasks/save-general}" th:object="${task}" method="post">


        <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}" />

            <div class="field-group">
                <label>Description</label>
                <input type="text" th:field="*{description}" placeholder="description" required>
            </div>

            <div class="field-group">
                <label>Due Date</label>
                <input type="date" th:field="*{dueDate}" placeholder="sarah@example.com" required>
            </div>

            <label>Assign to Project</label>
            <select th:field="*{projectId}" class="soft-select">
                <option value="" disabled selected>Select a project...</option>
                <option th:each="proj : ${projects}"
                        th:value="${proj.id}"
                        th:text="${proj.title}">Project Name</option>
            </select>

            <div class="field-group">
                <label>Completed</label>
                <input type="checkbox" th:field="*{completed}" placeholder="Sarah Co Inc.">
            </div>

            <div class="btn-group">
                <button type="submit" class="btn-save">Save Task</button>
                <a href="javascript:void(0);" onclick="history.back();" class="btn-cancel">Cancel</a>
            </div>
        </form>
    </div>
</div>

<div th:replace="fragments/footer :: common-footer"></div>
</body>
</html>
