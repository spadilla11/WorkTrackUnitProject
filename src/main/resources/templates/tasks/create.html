<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Title</title>
</head>
<body>

<div th:replace="fragments/navbar :: navbar"></div>


<div class="form-container">
    <div class="form-card">
        <h2>Create New Task</h2>
        <form th:action="@{/tasks/save}" th:object="${tasks}" method="post">

            <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}" />

            <div class="field-group">
                <label>Description</label>
                <input type="text" th:field="*{description}" placeholder="description" required>
            </div>

            <div class="field-group">
                <label>Due Date</label>
                <input type="date" th:field="*{dueDate}" placeholder="sarah@example.com" required>
            </div>

            <div class="field-group">
                <label>Completed</label>
                <input type="checkbox" th:field="*{completed}" placeholder="Sarah Co Inc.">
            </div>

            <div class="btn-group">
                <button type="submit" class="btn-save">Save Client</button>
                <a th:href="@{/tasks/list}" class="btn-cancel">Cancel</a>
            </div>
        </form>
    </div>
</div>

</body>
</html>
