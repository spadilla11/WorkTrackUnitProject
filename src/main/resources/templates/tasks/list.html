<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Title</title>
</head>
<body>

<div th:replace="fragments/navbar :: navbar"></div>



<table class="client-table">
    <thead class="table-header">
    <tr>
        <th>Task</th>
        <th>status</th>
        <th>Due Date</th>
    </tr>
    </thead>
    <tbody>
    <tr th:each="task : ${tasks}" class="client-row">
        <td>
            <strong th:text="${task.description}" >description</strong>
            <span th:text="${task.completed}" >status</span>
            <br>
            <span th:text="${task.dueDate}">Due Date</span>
        </td>

        <td>
            🚀 <span th:text="${task.project.title}">Project Name</span>
            </div>
        </td>

        <td>
            <a th:href="@{/tasks/edit/{id}(id=${task.id})}" >✏️</a>

            <form th:action="@{/tasks/delete/{id}(id=${task.id})}" method="post" >
                <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}" />
                <button type="submit" >🗑️</button>
            </form>
        </td>
    </tr>
    </tbody>
</table>
</div>
</body>
</html>
