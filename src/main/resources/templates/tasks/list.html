<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Title</title>
    <link rel="stylesheet" th:href="@{/css/nav-bar.css}">
    <link rel="stylesheet" th:href="@{/css/tasks-list.css}">
</head>
<body>

<div th:replace="fragments/navbar :: navbar"></div>

<div class="main-content">
    <div class="header-section">
        <h1 class="page-title">Tasks</h1>
        <a href="/tasks/add" class="add-task-btn">+ Add Task</a>
    </div>

    <div class="tasks-container">
        <table class="client-table">
            <tbody class="tasks-list">
            <tr th:each="task : ${tasks}" class="client-row">
                <td class="status-col">
                    <div th:class="${task.completed ? 'checkbox checked' : 'checkbox'}">
                        <span th:if="${task.completed}">✓</span>
                    </div>
                </td>

                <td class="details-col">
                    <span class="task-desc" th:text="${task.description}">Design homepage</span>
                    <span class="separator">—</span>
                    <span class="project-link" th:text="${task.projectName}">Website Redesign</span>
                    <span class="separator">—</span>
                    <span class="due-info">
                            📅 <span th:text="${task.dueDate}">May 19</span>
                        </span>
                    <span class="separator">—</span>
                    <span th:class="${task.completed ? 'status-text completed' : 'status-text pending'}"
                          th:text="${task.completed ? 'Completed' : 'Pending'}">Status</span>
                </td>

                <td class="actions-col">
                    <a th:href="@{/tasks/edit/{id}(id=${task.id})}" class="action-icon"> ✏️</a>
                    <form th:action="@{/tasks/delete/{id}(id=${task.id})}" method="post" style="display:inline;">
                        <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}" />
                        <button type="submit" class="action-icon btn-link">🗑️</button>
                    </form>
                </td>
            </tr>
            </tbody>
        </table>
    </div>
</div>
</body>
</html>
