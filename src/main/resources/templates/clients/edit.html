<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>WorkTrack - New Client</title>
    <link rel="stylesheet" th:href="@{/css/create-form.css}">
    <link rel="stylesheet" th:href="@{/css/nav-bar.css}">
</head>
<body>

<div th:replace="fragments/navbar :: navbar"></div>


<div class="form-container">
    <div class="form-card">
        <h2 th:text="${client.id != null} ? 'Edit Client' : 'Create New Client'">Edit Client</h2>
        <form th:action="@{/clients/save}" th:object="${client}" method="post" >
            <input type="hidden" th:field="*{id}" />
            <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}" />

            <div class="field-group">
                <label>Full Name</label>
                <input type="text" th:field="*{name}" placeholder="e.g. Sarah Johnson" required>
            </div>

            <div class="field-group">
                <label>Email Address</label>
                <input type="email" th:field="*{email}" placeholder="sarah@example.com" required>
            </div>

            <div class="field-group">
                <label>Company Name</label>
                <input type="text" th:field="*{company}" placeholder="Sarah Co Inc.">
            </div>

            <div class="btn-group">
                <button type="submit" class="btn-save">Save Client</button>
                <a th:href="@{/clients/home}" class="btn-cancel">Cancel</a>
            </div>
        </form>
    </div>
</div>

</body>
</html>
