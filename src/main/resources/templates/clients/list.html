<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>WorkTrack - Clients</title>

    <link rel="stylesheet" th:href="@{/css/clients-list.css}">
    <link rel="stylesheet" th:href="@{/css/nav-bar.css}">
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Material+Symbols+Rounded:opsz,wght,FILL,GRAD@24,400,0,0" />
</head>
<body>

<div th:replace="fragments/navbar :: navbar"></div>

<div class="container">

    <div class="dashboard-grid">
        <div class="stat-card">
            <div class="stat-icon clients">
                <span class="material-symbols-rounded">group</span>
            </div>
            <div class="stat-content">
                <h3>Total Clients</h3>
                <p th:text="${totalClients}">2</p>
            </div>
        </div>

        <div class="stat-card">
            <div class="stat-icon projects">
                <span class="material-symbols-rounded">tactic</span>
            </div>
            <div class="stat-content">
                <h3>Active Projects</h3>
                <p th:text="${totalProjects}">1</p>
            </div>
        </div>

        <div class="stat-card">
            <div class="stat-icon tasks">
                <span class="material-symbols-rounded">checklist</span>
            </div>
            <div class="stat-content">
                <h3>Pending Tasks</h3>
                <p th:text="${totalTasks}">0</p>
            </div>
        </div>
    </div>

    <div class="section-header">
        <div>
            <h2>Client Directory</h2>
            <p>Manage your relationships and ongoing work</p>
        </div>
        <a th:href="@{/clients/new}" class="btn-primary">
            <span class="material-symbols-rounded" style="font-size: 20px;">add</span>
            New Client
        </a>
    </div>

    <div class="table-container">
        <table class="client-table">
            <thead>
            <tr>
                <th class="col-name">Name & Projects</th>
                <th class="col-email">Contact Email</th>
                <th class="col-company">Company</th>
                <th class="col-actions" style="text-align: right;">Actions</th>
            </tr>
            </thead>

            <tbody>
            <tr th:each="client : ${clients}" class="client-row">
                <td>
                    <div class="client-info">
                        <a th:href="@{/clients/CLprojects/{id}(id=${client.id})}" class="client-name">
                            <span th:text="${client.name}">Jacob Dozier</span>
                        </a>
                        <div class="tag-container">
                                <span th:each="project, iter : ${client.projects}"
                                      th:if="${iter.index < 2}"
                                      th:text="${project.title}"
                                      class="badge">Rust Project</span>
                        </div>
                    </div>
                </td>

                <td>
                    <a th:href="'mailto:' + ${client.email}" class="email-link">
                        <span class="material-symbols-rounded" style="font-size: 18px;">mail</span>
                        <span th:text="${client.email}">JacobD@gmail.com</span>
                    </a>
                </td>

                <td>
                    <span class="company-tag" th:text="${client.company}">Dozer Co</span>
                </td>

                <td>
                    <div class="actions-cell">
                        <a th:href="@{/clients/edit/{id}(id=${client.id})}" class="btn-icon" title="Edit">
                            <span class="material-symbols-rounded" style="font-size: 20px;">edit_square</span>
                        </a>

                        <form th:action="@{/clients/delete/{id}(id=${client.id})}" method="post"
                              onsubmit="return confirm('Delete this client?');" style="margin: 0;">
                            <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}" />
                            <button type="submit" class="btn-icon" style="border:none; cursor:pointer;" title="Delete">
                                <span class="material-symbols-rounded" style="font-size: 20px;">delete</span>
                            </button>
                        </form>
                    </div>
                </td>
            </tr>
            </tbody>
        </table>
    </div>
</div>

<div th:replace="fragments/footer :: common-footer"></div>

</body>
</html>
