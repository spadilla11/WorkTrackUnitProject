<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>WorkTrack - Clients</title>
    <link rel="stylesheet" th:href="@{/css/clients-list.css}">
    <link rel="stylesheet" th:href="@{/css/nav-bar.css}">
</head>
<body>

<div th:replace="fragments/navbar :: navbar"></div>

<div class="container">

    <div class="dashboard">
        <div class="dashboard-box">
            <h2>Total Clients 👤</h2>
            <p th:text="${totalClients}">0</p>
        </div>

        <div>
            <h2>Active Projects 📂</h2>
            <p th:text="${totalProjects}">0</p>
        </div>

        <div class="dashboard-box">
            <h2>Pending Tasks ☑</h2>
            <p th:text="${totalTasks}">0</p>
        </div>
    </div>

    <div>
        <h2 >Clients</h2>
        <a th:href="@{/clients/new}">+ New Client</a>
    </div>

    <table class="client-table">
        <thead class="table-header">
        <tr>
            <th>Name </th>
            <th>Email</th>
            <th>Company</th>
            <th>Action</th>
        </tr>
        </thead>

        <tbody>
        <tr th:each="client : ${clients}" class="client-row">
            <td>
                <a th:href="@{/clients/CLprojects/{id}(id=${client.id})}" class="client-link">
                    <strong th:text="${client.name}">Sarah Johnson</strong>
                </a>
                <br>
            </td>

            <td>
                <a th:href="'mailto:' + ${client.email}" th:text="${client.email}" class="email-link">
                    email@example.com
                </a>
            </td>

            <td th:text="${client.company}">Company</td>

            <td>
                <a th:href="@{/clients/edit/{id}(id=${client.id})}" >✎</a>
                <form th:action="@{/clients/delete/{id}(id=${client.id})}" method="post"
                      onsubmit="return confirm('Are you sure you want to delete this client?');"
                      style="display: inline;">
                    <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}" />
                    <button type="submit" style="border: none; background: none; cursor: pointer; padding: 0;">
                        🗑️
                    </button>
                </form>
            </td>
        </tr>
        </tbody>
    </table>
</div>

</body>
</html>
