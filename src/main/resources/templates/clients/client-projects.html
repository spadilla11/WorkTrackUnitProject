<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>WorkTrack - Client Portfolio</title>
    <link rel="stylesheet" th:href="@{/css/nav-bar.css}">
    <link rel="stylesheet" th:href="@{/css/client-projects.css}">
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Material+Symbols+Rounded:opsz,wght,FILL,GRAD@24,400,0,0" />
</head>
<body>

<div th:replace="fragments/navbar :: navbar"></div>

<div class="container main-content">

    <a th:href="@{/clients/home}" class="back-link fade-in">
        <span class="material-symbols-rounded">arrow_back</span>
        Back to Dashboard
    </a>

    <div class="profile-card fade-in delay-1">
        <div class="client-header">
            <h1 th:text="${client.name}">Jacob Dozier</h1>
            <div class="client-meta">
                <span class="meta-item">
                    <span class="material-symbols-rounded">mail</span>
                    <span th:text="${client.email}">client@email.com</span>
                </span>
                <span class="meta-item">
                    <span class="material-symbols-rounded">business</span>
                    <span th:text="${client.company}">Dozer Co</span>
                </span>
            </div>
        </div>

        <div class="budgets-container">
            <div class="total-budget-box">
                <span class="label">Total Combined Budget</span>
                <h2 class="amount"
                    th:text="${'$' + #numbers.formatDecimal(#aggregates.sum(client.projects.![totalBudget]), 1, 'COMMA', 2, 'POINT')}">
                    $0.00
                </h2>
            </div>
        </div>
    </div>

    <div class="section-header fade-in delay-2">
        <h2 th:text="'Projects (' + ${#lists.size(client.projects)} + ')'">Projects (2)</h2>
        <a th:href="@{/projects/new}" class="btn-primary">
            <span class="material-symbols-rounded">add_circle</span>
            <span>Add Project</span>
        </a>
    </div>

    <div class="project-grid fade-in delay-3">
        <div th:each="project : ${client.projects}" class="project-card">
            <div class="card-header">
                <h3 th:text="${project.title}">Rust Project</h3>
                <span class="status-badge" th:text="${project.status}" th:classappend="${#strings.toLowerCase(project.status)}">Planned</span>
            </div>

            <div class="card-body">
                <p><strong>Budget:</strong> <span class="highlight-val" th:text="'$' + ${#numbers.formatDecimal(project.totalBudget, 1, 'COMMA',2, 'POINT')}">$65000</span></p>
                <p><strong>Deadline:</strong> <span class="highlight-val" th:text="${project.deadLine}">2026-05-01</span></p>
            </div>

            <div class="card-footer">
                <a th:href="@{/projects/details/{id}(id=${project.id})}" class="view-details">
                    View Details
                    <span class="material-symbols-rounded">arrow_forward</span>
                </a>
            </div>
        </div>
    </div>

    <div th:if="${#lists.isEmpty(client.projects)}" class="empty-state fade-in delay-3">
        <span class="material-symbols-rounded" style="font-size: 48px; color: var(--text-muted);">folder_off</span>
        <p>This client currently has no active projects.</p>
    </div>
</div>

<div th:replace="fragments/footer :: common-footer"></div>
</body>
</html>
